[Rainmeter]
Update=10
DynamicWindowSize=1

[Metadata]
Name=apps.launcher
Author=alexhaiduk
Information=Windows App launcher
License=Creative Commons BY-NC-SA 3.0
Version=1.0.3

[Variables]
Title="steam"
FolderPath="%APPDATA%\Microsoft\Windows\Start Menu\Programs\Steam\"
IconsPath="#@##Title#.icons"
gIconSize=3
gIconSize1=Small
gIconSize2=Medium
gIconSize3=Large
gIconSize4=ExtraLarge
LogOnceStart=1

@IncludeVariables=#@#config\config.inc

[mFolder]
Measure=Plugin
Plugin=FolderInfo
Folder=#FolderPath#
InfoType=FileCount
IfCondition=( #LogOnceStart# = 1 )
IfTrueAction=[!Log "Skin #CURRENTFILE# Path: #FolderPath#"][!Log "Skin #CURRENTFILE# Icon size set to [#gIconSize[#gIconSize]] ([#lIconSize[#lIconSize]]x[#lIconSize[#lIconSize]])"]

[mAppCount]
Measure=Plugin
Plugin=FolderInfo
Folder=[mFolder]
InfoType=FileCount
DynamicVariables=1
UpdateDivider=1000

[mApps]
Measure=Plugin
Plugin=FileView
Path=#FolderPath#
Recursive=0
ShowDotDot=0
ShowFolder=0
ShowFile=1
SortType=Type
ShowHidden=0
HideExtensions=1
Extensions="lnk;url"
Count=[mAppCount]
DynamicVariables=1
UpdateDivider=1000
IfCondition=( #LogOnceStart# = 1 )
IfTrueAction=[!Log "Skin #CURRENTFILE# - Files count in folder: [mAppCount]"]

@IncludeNames=#@#config\apps.name.inc

@IncludeIcons=#@#config\apps.icon.inc

[styleTitle]
StringAlign=Center
StringCase=Upper
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#colorText#
FontFace=#fontName#
FontSize=10
AntiAlias=1
ClipString=1

[mBackground]
Meter=Image
ImageName=#@#background\background.png
ScaleMargins=0,34,0,14
W=( [mAppCount] <= 4 ? #gwWidth2# : ( [mAppCount] <= 9 ? #gwWidth3# : #gwWidth4# ) )
H=( [mAppCount] <= 2 ? #le2# : ( [mAppCount] <= 4 ? #le4# : ( [mAppCount] <= 6 ? #le6# : ( [mAppCount] <= 9 ? #le9# : ( [mAppCount] <= 12 ? #le12# : ( [mAppCount] <= 16 ? #eq16# : #eq16# ) ) ) ) ) )
X=0
Y=0
DynamicVariables=1
UpdateDivider=10
MouseOverAction=[!CommandMeasure "mApps" "Update"]

[mTitle]
Meter=String
MeterStyle=styleTitle
X=( [mTitle:W] / 2 )
Y=12
W=( [mAppCount] <= 4 ? #gwWidth2# : ( [mAppCount] <= 9 ? #gwWidth3# : #gwWidth4# ) )
H=18
Text=#Title#
DynamicVariables=1
UpdateDivider=10

@IncludeApps=#@#config\apps.inc
